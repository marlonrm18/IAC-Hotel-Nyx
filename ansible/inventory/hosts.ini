# ─────────────────────────────────────────────────────────────────────────────
# Inventario: SOLO localhost. No hay hosts remotos ni SSH (Modo A).
# El "host" es la máquina que ejecuta Ansible (tu equipo o el runner de CI), que
# actúa como controlador de AWS mediante las credenciales del entorno.
# ─────────────────────────────────────────────────────────────────────────────
[local]
localhost ansible_connection=local ansible_python_interpreter="{{ ansible_playbook_python }}"
