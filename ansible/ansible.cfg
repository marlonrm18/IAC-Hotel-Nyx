# ─────────────────────────────────────────────────────────────────────────────
# Hotel Nyx — Configuración de Ansible (Modo A: orquestador local, sin SSH).
# Todos los playbooks corren en localhost/CI y hablan con AWS vía las colecciones
# amazon.aws / community.aws. Ansible NO recrea infraestructura (eso es Terraform);
# solo hace la configuración lógica post-aprovisionamiento.
# ─────────────────────────────────────────────────────────────────────────────
[defaults]
inventory            = inventory/hosts.ini
roles_path           = roles
gathering            = explicit
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = yaml
interpreter_python   = auto_silent
# Evita fugas accidentales: las tareas con datos sensibles llevan no_log: true,
# pero además forzamos que los diffs no muestren contenido por defecto.
no_log               = False

[inventory]
enable_plugins = ini
