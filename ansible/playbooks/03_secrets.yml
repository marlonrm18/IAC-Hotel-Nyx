# ─────────────────────────────────────────────────────────────────────────────
# 03 — Inyecta el valor REAL del secret de Mercado Pago en Secrets Manager.
#
# Terraform crea el CONTENEDOR del secret (hotel-nyx/dev/mercadopago) con un valor
# placeholder ("REEMPLAZAR") y lifecycle.ignore_changes = [secret_string], de modo
# que un `terraform apply` posterior NO pisa el valor real. Este playbook hace el
# equivalente a `aws secretsmanager put-secret-value`.
#
# SEGURIDAD: el access_token y el webhook_secret NUNCA se hardcodean ni se
# versionan. Se obtienen por una de estas dos vías:
#   (a) vars_prompt interactivo (por defecto), o
#   (b) variables cifradas con ansible-vault: pasar -e @secret.vault.yml --ask-vault-pass
#       definiendo mp_access_token / mp_webhook_secret (el prompt se omite si ya
#       vienen definidas).
# Todas las tareas que ven el valor llevan no_log: true.
#
# IDEMPOTENCIA: el módulo compara el secret_string actual con el nuevo; si no
# cambió, no crea una nueva versión (changed=false). Reaplicar con el mismo valor
# es seguro.
# ─────────────────────────────────────────────────────────────────────────────
- name: "03 · Inyectar secret real de Mercado Pago"
  hosts: local
  gather_facts: false
  tags: ["secrets"]

  # Solo pregunta si la variable NO viene ya por -e / vault.
  vars_prompt:
    - name: mp_access_token
      prompt: "Mercado Pago ACCESS_TOKEN (TEST-...). Vacío si lo pasas por vault (-e @secret.vault.yml)"
      private: true
      confirm: false
      unsafe: true

    - name: mp_webhook_secret
      prompt: "Mercado Pago WEBHOOK_SECRET. Vacío si lo pasas por vault"
      private: true
      confirm: false
      unsafe: true

  tasks:
    - name: Validar que tenemos ambos valores (por prompt o por vault)
      ansible.builtin.assert:
        that:
          - mp_access_token | default('') | length > 0
          - mp_webhook_secret | default('') | length > 0
        fail_msg: >-
          Falta access_token o webhook_secret. Respóndelos en el prompt o pásalos
          con -e @secret.vault.yml (ansible-vault).
        quiet: true
      no_log: true

    - name: put-secret-value sobre {{ mercadopago_secret_name }}
      amazon.aws.secretsmanager_secret:
        name: "{{ mercadopago_secret_name }}"
        region: "{{ aws_region }}"
        state: present
        # No pasamos kms_key_id ni description: así el módulo solo actualiza el
        # VALOR y respeta el contenedor/CMK que ya creó Terraform.
        secret_type: string
        secret_string: "{{ { 'access_token': mp_access_token, 'webhook_secret': mp_webhook_secret } | to_json }}"
        overwrite: true
      no_log: true
      register: mp_secret

    - name: Resumen (sin exponer el valor)
      ansible.builtin.debug:
        msg: "Secret {{ mercadopago_secret_name }} actualizado (changed={{ mp_secret.changed }})."
